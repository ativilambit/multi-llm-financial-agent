# Hybrid fast config for MNDY:
#   - OpenAI does deep web_search (grounded, slow ~3-5 min)
#   - Anthropic + Grok + Gemini Flash reason from priors (fast ~10-30s each)
#   - Synthesizer compares all four without extra search
# Total wall-clock: ~3-5 min vs ~5-8 min for the full-search config.
# Use this for faster iteration; use mndy_2026_05_08.yaml for highest-quality grounded runs.

symbol: MNDY
company_name:

# Price fields are optional reference hints only (unverified); models must source last close via web_search.
today_low: 68
today_high: 74
current_price: 73.24
today_date: "Fri May 8, 2026"
today_session: "after the market trading window"

earnings_date: "Mon May 11 2026"
earnings_timing: "early morning et, before the market open"

target_dates:
  - "Mon May 11"
  - "Fri May 15"
  - "Fri May 22"
  - "Fri May 29"
  - "Fri Jun 5"
next_trading_day: "Tues May 12"
followup_open_date: "Mon May 18"

historical_quarters: 6
short_interest_lookbacks:
  - "last two months back"
  - "last month"
  - "last week"
  - "yesterday"
  - "today"

providers:
  - name: anthropic
    model: claude-opus-4-7
    web_search: false       # fast, reasons from priors + cached training data
    request_timeout_s: 180
  - name: openai
    web_search: true        # deep web research; the grounded source of truth
    request_timeout_s: 600
  - name: grok
    web_search: false       # fast reasoner
    request_timeout_s: 180
  - name: gemini
    model: gemini-3-flash-preview
    web_search: false       # fast reasoner
    request_timeout_s: 180
synthesizer:
  name: gemini
  model: gemini-3.1-pro-preview
  web_search: false         # synthesis from the four answers, no extra search
  request_timeout_s: 180

verifier_provider: gemini
verifier_model: gemini-3.1-pro-preview
