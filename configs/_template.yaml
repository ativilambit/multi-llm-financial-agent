# Copy this file to create a new run config.
#
# Required:
# - symbol: Stock ticker symbol (e.g. "MNDY")
# - today_low / today_high / current_price: Today's trading range and current price
# - today_date / today_session: Human-readable timestamp context (e.g. "Fri May 8, 2026")
# - earnings_date / earnings_timing: Human-readable earnings timing text
# - target_dates: List of dates referenced in the prompt
# - next_trading_day: Next trading day after earnings
# - followup_open_date: A later follow-up open date referenced in the prompt
# - providers: Which provider backends to run in parallel (see examples below)
# - synthesizer: Which backend runs final synthesis (string or object; see below)
#
# Optional:
# - company_name: Company name (informational; not required by the base prompt)
# - historical_quarters: Number of quarters to include in the empirical move table
# - short_interest_lookbacks: Phrases describing lookback windows to ask for
#
# Per-provider options (when using object form under `providers:`):
# - model: API model id for that backend (default is each provider's built-in default, e.g. Opus for Anthropic)
# - max_output_tokens: Optional cap for this provider's completion only (default: global `max_output_tokens`, 16000)
# - web_search: true|false — override CLI/run default for this provider only (default: inherit run default)
# - request_timeout_s: Per-provider HTTP/generate timeout in seconds (default: global `request_timeout_s`)

symbol: "TICKER"
company_name: "Optional Company Name"

today_low: 0
today_high: 0
current_price: 0
today_date: "Fri May 8, 2026"
today_session: "after the market trading window"

earnings_date: "Mon May 11 2026"
earnings_timing: "early morning et, before the market open"

target_dates:
  - "Mon May 11"
  - "Fri May 15"
  - "Fri May 22"
  - "Fri May 29"
  - "Fri Jun 5"
next_trading_day: "Tues May 12"
followup_open_date: "Mon May 18"

historical_quarters: 11
short_interest_lookbacks:
  - "last two months back"
  - "last month"
  - "last week"
  - "yesterday"
  - "today"

# String list (each entry is shorthand for {name: "..."}):
# providers: ["anthropic", "openai", "gemini", "grok"]

# Object list (recommended when overriding models or timeouts):
providers:
  - name: anthropic
    model: claude-opus-4-7
    max_output_tokens: 24000
  - name: openai
    model: gpt-5.5
  - name: gemini
    model: gemini-2.5-flash
  - name: grok
    max_output_tokens: 12000

# Bare string = {name: "gemini"} (default synthesizer if you omit `synthesizer` entirely is gemini).
# synthesizer: gemini

# Object form (recommended for synthesis-only overrides):
synthesizer:
  name: gemini
  model: gemini-2.5-pro
  web_search: true
  request_timeout_s: 240

# Optional tuning (defaults shown):
# max_output_tokens: 16000
#   — default completion budget for each fan-out provider (parallel answers).
# synthesizer_max_output_tokens: 24000
#   — much larger than max_output_tokens: synthesis must reconcile all providers across 13 sections.
# retry_max_attempts: 3
# retry_base_delay_s: 2.0
# synthesizer_max_input_tokens: 20000
