# Copy this file to create a new run config.
#
# Required:
# - symbol: Stock ticker symbol (e.g. "MNDY")
# Optional (prompt labels; omit to auto-fill at load from America/New_York calendar date):
# - today_date / today_session
# Optional price hints (unverified; models must fetch last close via web_search):
# - today_low / today_high / current_price OR reference_session_low / reference_session_high / reference_last_price
# - earnings_on: ISO calendar date for the earnings print (YYYY-MM-DD). When set, you may omit
#   human-readable ``earnings_date`` and/or ``next_trading_day`` / ``followup_open_date``; missing strings
#   are filled at load from an NYSE weekend + holiday calendar (see equity_analyst.nyse_trading_days).
# - earnings_date: Human-readable earnings date string used in the prompt (omit when ``earnings_on`` is set)
# - target_dates: List of dates referenced in the prompt
# - next_trading_day: Next regular session after the earnings calendar day (omit to derive from earnings dates)
# - followup_open_date: Fifth trading session after the earnings calendar day by default (omit to derive)
# - providers: Which provider backends to run in parallel (see examples below)
# - synthesizer: Which backend runs final synthesis (string or object; see below)
#
# Optional:
# - company_name: Company name (informational; not required by the base prompt)
# - earnings_timing: Human-readable BMO/AMC/etc. label; if omitted, models verify timing via web_search (see commented example under earnings_date).
# - historical_quarters: Number of quarters to include in the empirical move table
# - short_interest_lookbacks: Phrases describing lookback windows to ask for
# - t0_blend_preset: T-0-only horizon blend (qual:quant). One of: default | quant_lean | quant_dominant | qual_dominant
#   (T-3..T-1 stays 55:45; T+1..T+5 stays 49:51). Env EQUITY_T0_BLEND_PRESET or CLI --t0-blend overrides when omitted here.
#
# Per-provider options (when using object form under `providers:`):
# - model: API model id for that backend (default is each provider's built-in default, e.g. Opus for Anthropic)
# - max_output_tokens: Optional cap for this provider's completion only (default: global `max_output_tokens`, 16000)
# - web_search: true|false — override CLI/run default for this provider only (default: inherit run default)
# - request_timeout_s: Per-provider asyncio/generate timeout in seconds (default: global `request_timeout_s`, 180s).
#   OpenAI uses streaming Responses for long web-search runs; raise this globally or per provider if you still hit timeouts.

symbol: "TICKER"
company_name: "Optional Company Name"

# Reference-only hints (optional). Prefer fetching last regular-session close in the prompt.
# Human-readable "as of" labels for the prompt (optional — omitted keys default from America/New_York
# date at config load and "regular U.S. session"; see equity_analyst.config.default_today_labels_ny).
# today_date: "Fri May 8, 2026"
# today_session: "after the market trading window"

# Earnings cluster: either set ``earnings_date`` (and optionally next/followup), or use ``earnings_on`` alone.
# earnings_on: 2026-05-19
# earnings_date: "Tue May 19 2026"
# next_trading_day: "Wed May 20"
# followup_open_date: "Wed May 27"

earnings_date: "Mon May 11 2026"
# Optional. Human-readable earnings call timing (e.g. BMO / AMC). If omitted, the equity prompt
# instructs models to fetch and verify the actual release/call timing via web_search and cite sources.
# earnings_timing: "early morning et, before the market open"

target_dates:
  - "Mon May 11"
  - "Fri May 15"
  - "Fri May 22"
  - "Fri May 29"
  - "Fri Jun 5"
next_trading_day: "Tues May 12"
followup_open_date: "Mon May 18"

historical_quarters: 11
short_interest_lookbacks:
  - "last two months back"
  - "last month"
  - "last week"
  - "yesterday"
  - "today"

# String list (each entry is shorthand for {name: "..."}):
# providers: ["anthropic", "openai", "gemini", "grok"]

# Object list (recommended when overriding models or timeouts):
providers:
  - name: anthropic
    model: claude-opus-4-7
    max_output_tokens: 24000
  - name: openai
    model: gpt-5.5
  - name: gemini
    model: gemini-2.5-flash
  - name: grok
    max_output_tokens: 12000

# Bare string = {name: "gemini"} (default synthesizer if you omit `synthesizer` entirely is gemini).
# synthesizer: gemini

# Object form (recommended for synthesis-only overrides):
synthesizer:
  name: gemini
  model: gemini-3.1-pro-preview
  web_search: true
  request_timeout_s: 240

# Optional tuning (defaults shown):
# max_output_tokens: 16000
#   — default completion budget for each fan-out provider (parallel answers).
# synthesizer_max_output_tokens: 24000
#   — much larger than max_output_tokens: synthesis must reconcile all providers across 13 sections.
# verifier_provider: gemini
#   — registry key for the iterative-mode verification step (default gemini). Use anthropic, openai, etc. if desired.
# verifier_model: gemini-3.1-pro-preview
#   — optional API model id for the verifier only (default: each provider's built-in default, e.g. GeminiProvider default).
# verifier_max_output_tokens: 16384
#   — iterative verifier JSON completion budget (default 16384; max 32768).
# fan_out_on_continue: true
#   — iterative: when true (default), iteration 2+ re-runs fan-out providers if the route step emitted
#     follow-up questions from contradictions/unverifiable, even when conditional_fanout_enabled is true
#     and the verifier did not set refan_out_*. Set false for legacy “verifier refan only” cost behavior.
# request_timeout_s: 180
#   — default asyncio wait_for ceiling for each provider/synthesis call (3 minutes).
# retry_max_attempts: 3
# retry_base_delay_s: 2.0
# synthesizer_max_input_tokens: 100000
