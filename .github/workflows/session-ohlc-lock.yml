# Post–regular-session OHLC lock (Postgres-only): writes yfinance daily bars into ``runs.session_*``.
# Requires ``DATABASE_URL``. ``EQUITY_OHLC_LOCK_SYMBOLS`` is optional: with ``--symbols-env``,
# those symbols are merged when set; otherwise ``--gha-auto`` discovers every symbol that still has
# pending session OHLC rows in Postgres (see CLI ``--lookback-days`` / ``--runs-env``).
#
# Schedule: weekdays 22:30 UTC (coarse trigger). America/New_York regular equity close is
# 16:00 ET; the CLI ``--gha-auto`` no-ops before 16:15 America/New_York and on weekends, so
# the UTC cron does not exactly track US close across DST—adjust if you need a fixed UTC anchor.
name: Session OHLC lock

on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "NYSE session date YYYY-MM-DD (required with run_ids)"
        required: false
        type: string
      symbols:
        description: "Comma-separated symbols (optional; omit or leave empty for DB discovery in gha-auto)"
        required: false
        type: string
      run_ids:
        description: "Comma-separated run_id values (optional; requires date when set)"
        required: false
        type: string
      lookback_days:
        description: "For gha-auto without explicit symbols — passed as --lookback-days (default 14)"
        required: false
        type: number
        default: 14
      dry_run:
        description: "If true, pass --dry-run (still requires DATABASE_URL to resolve targets)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lock-session-ohlc:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Require DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL secret is required for lock-session-ohlc"
            exit 1
          fi

      - name: Lock session OHLC
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EQUITY_OHLC_LOCK_SYMBOLS: ${{ secrets.EQUITY_OHLC_LOCK_SYMBOLS }}
        run: |
          set -euo pipefail
          DRY=""
          LOOKBACK="14"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LOOKBACK="${{ inputs.lookback_days }}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              DRY="--dry-run"
            fi
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.run_ids }}" ]; then
              python -m equity_analyst lock-session-ohlc ${DRY} --run-id "${{ inputs.run_ids }}" --date "${{ inputs.date }}"
            elif [ -n "${{ inputs.symbols }}" ]; then
              if [ -n "${{ inputs.date }}" ]; then
                python -m equity_analyst lock-session-ohlc ${DRY} --symbols "${{ inputs.symbols }}" --date "${{ inputs.date }}"
              else
                python -m equity_analyst lock-session-ohlc ${DRY} --symbols "${{ inputs.symbols }}"
              fi
            else
              python -m equity_analyst lock-session-ohlc ${DRY} --gha-auto --symbols-env --lookback-days "${LOOKBACK}"
            fi
          else
            python -m equity_analyst lock-session-ohlc --gha-auto --symbols-env --lookback-days "${LOOKBACK}"
          fi

