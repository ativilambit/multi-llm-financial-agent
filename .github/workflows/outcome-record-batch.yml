# Batch outcome recording: **Shape A/B** scan ``outputs/`` on disk, or **from_db** (Postgres-only).
#
# ``from_db`` selects ``runs`` missing ``outcomes`` (with ``run_document``), materializes a temp
# ``outputs/<run_id>/run.json``, and invokes ``record_outcome_for_run_dir`` (optional ``--auto-fetch``).
#
# Optional ``artifact_run_id`` still downloads ``equity-analyst-outputs`` before Shape A/B so CI
# can hydrate ``outputs/`` when not using ``from_db``.
name: Outcome record batch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "from_db = Postgres queue; shape_a = --batch-dir; shape_b = --symbols + optional --since"
        required: true
        type: choice
        options:
          - from_db
          - shape_a
          - shape_b
      batch_dir:
        description: "Shape A: path relative to repo root (e.g. outputs/batch_20260514T120000Z)"
        required: false
        type: string
        default: ""
      symbols:
        description: "Shape B: comma-separated tickers (required when mode=shape_b). from_db: optional filter."
        required: false
        type: string
        default: ""
      since:
        description: "Shape B: YYYY-MM-DD lower bound for newest-only scan (default CLI: 7 days ago UTC)"
        required: false
        type: string
        default: ""
      lookback_days:
        description: "from_db: include runs whose coalesce(finished_at, started_at, created_at) is within this many days (UTC)"
        required: false
        type: number
        default: 14
      limit:
        description: "from_db: max runs to process in one dispatch"
        required: false
        type: number
        default: 50
      auto_fetch:
        description: "Pass --auto-fetch (yfinance merge before persisting)"
        required: false
        type: boolean
        default: true
      dry_run:
        description: "If true, list targets only (no files, registry, or DB writes; from_db still needs DATABASE_URL to query the queue)"
        required: false
        type: boolean
        default: false
      artifact_run_id:
        description: "Optional: GitHub Actions run id for artifact ``equity-analyst-outputs`` (Shape A/B only)"
        required: false
        type: string
        default: ""
      continue_on_error:
        description: "Pass --continue-on-error (default true)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

jobs:
  outcome-record-batch:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download outputs artifact (optional, Shape A/B)
        if: ${{ inputs.mode != 'from_db' && inputs.artifact_run_id != '' }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ inputs.artifact_run_id }}
          name: equity-analyst-outputs
          path: outputs

      - name: Require DATABASE_URL for from_db mode
        if: ${{ inputs.mode == 'from_db' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL secret is required when mode=from_db (including dry_run list queries)"
            exit 1
          fi

      - name: Require DATABASE_URL for writes
        if: ${{ inputs.mode != 'from_db' && inputs.dry_run != true }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL secret is required unless dry_run is true"
            exit 1
          fi

      - name: Run outcome maintenance
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          AUTO=""
          if [ "${{ inputs.auto_fetch }}" = "true" ]; then AUTO="--auto-fetch"; fi
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          COE=""
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then COE="--continue-on-error"; else COE="--no-continue-on-error"; fi
          if [ "${{ inputs.mode }}" = "from_db" ]; then
            SYM=""
            if [ -n "${{ inputs.symbols }}" ]; then SYM="--symbols ${{ inputs.symbols }}"; fi
            python scripts/gh_outcomes_from_db.py \
              --lookback-days ${{ inputs.lookback_days }} \
              --limit ${{ inputs.limit }} \
              ${SYM} ${AUTO} ${DRY} ${COE}
            exit $?
          fi
          if [ "${{ inputs.mode }}" = "shape_a" ]; then
            if [ -z "${{ inputs.batch_dir }}" ]; then
              echo "::error::batch_dir is required for mode=shape_a"
              exit 1
            fi
            python -m equity_analyst outcome-record-batch --batch-dir "${{ inputs.batch_dir }}" ${AUTO} ${DRY} ${COE}
          else
            if [ -z "${{ inputs.symbols }}" ]; then
              echo "::error::symbols is required for mode=shape_b"
              exit 1
            fi
            SINCE=""
            if [ -n "${{ inputs.since }}" ]; then SINCE="--since ${{ inputs.since }}"; fi
            python -m equity_analyst outcome-record-batch --symbols "${{ inputs.symbols }}" ${SINCE} ${AUTO} ${DRY} ${COE}
          fi
