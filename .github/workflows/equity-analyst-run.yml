# Minimal helper: upload the repo’s ``outputs/`` tree as artifact ``equity-analyst-outputs`` (10-day retention).
# Use after local or self-hosted runs have populated ``outputs/``, or from a job that checks in run trees.
name: Equity analyst outputs artifact

on:
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Artifact retention in days (GitHub max 90)"
        required: false
        type: number
        default: 10

permissions:
  contents: read

jobs:
  upload-outputs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload outputs/
        uses: actions/upload-artifact@v4
        with:
          name: equity-analyst-outputs
          path: outputs/
          if-no-files-found: warn
          retention-days: ${{ inputs.retention_days }}
