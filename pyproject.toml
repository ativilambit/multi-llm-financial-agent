[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["RUF001", "RUF002"]
"equity_analyst/drift_bounds.py" = ["RUF001", "RUF002"]
"equity_analyst/sigma_compute.py" = ["RUF001", "RUF002"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
pretty = true

[[tool.mypy.overrides]]
module = "equity_analyst.drive_uploader"
disable_error_code = ["unused-ignore"]

[tool.pytest.ini_options]
testpaths = ["tests"]

